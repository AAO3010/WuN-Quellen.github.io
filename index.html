<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Quellen</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="image/Yin_yang.png">
</head>
<body>
  <div class="background-glow"></div>

  <header class="hero">
    <div class="container">
      <span class="badge">Quellenübersicht</span>
      <h1>Meine Quellen</h1>
      <p>
        Diese Webseite wurde erstellt, damit die Quellen auf meinem Plakat
        sauberer, moderner und übersichtlicher dargestellt werden.
        Mit einem Klick gelangt man direkt zur jeweiligen Quelle.
      </p>
    </div>
  </header>

  <main class="container">
    <section class="stats">
      <div class="stat-card">
  <!-- <strong id="sourceCount">0</strong> -->
    </section>

    <section class="sources-section">
      <div class="section-head">
        <h2>Alle Quellen</h2>
        <p>Klicke auf eine Karte, um die Quelle zu öffnen.</p>
      </div>

      <div class="sources-grid" id="sourcesGrid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
